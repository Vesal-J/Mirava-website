<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mirava Admin Panel</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      .admin-container {
        max-width: 1200px;
        margin: 100px auto;
        padding: 20px;
      }

      .admin-header {
        text-align: center;
        margin-bottom: 40px;
      }

      .admin-login {
        max-width: 400px;
        margin: 100px auto;
        padding: 30px;
        border-radius: 20px;
      }

      .admin-login input {
        width: 100%;
        padding: 10px;
        margin: 10px 0;
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.1);
        color: white;
      }

      .suggestions-list {
        display: grid;
        gap: 20px;
      }

      .suggestion-card {
        padding: 20px;
        border-radius: 15px;
        background: rgba(20, 20, 40, 0.8);
        margin-bottom: 20px;
        position: relative;
      }

      .suggestion-card.pending {
        border-left: 4px solid #ffa500;
        background: rgba(255, 165, 0, 0.1);
      }

      .suggestion-card.approved {
        border-left: 4px solid #4dffb8;
        background: rgba(77, 255, 184, 0.1);
      }

      .suggestion-card.rejected {
        border-left: 4px solid #ff6b6b;
        background: rgba(255, 107, 107, 0.1);
        opacity: 0.8;
      }

      .suggestion-status {
        position: absolute;
        top: 20px;
        right: 20px;
        padding: 5px 10px;
        border-radius: 5px;
        font-size: 12px;
        font-weight: bold;
      }

      .status-pending {
        background: #ffa500;
        color: #000;
      }

      .status-approved {
        background: #4dffb8;
        color: #000;
      }

      .status-rejected {
        background: #ff6b6b;
        color: #fff;
      }

      .suggestion-actions {
        margin-top: 15px;
        display: flex;
        gap: 10px;
      }

      .btn-approve,
      .btn-reject,
      .btn-delete,
      .btn-edit {
        padding: 8px 16px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-weight: bold;
        transition: transform 0.2s;
      }

      .btn-approve {
        background: #4dffb8;
        color: #000;
      }

      .btn-reject {
        background: #ff6b6b;
        color: #fff;
      }

      .btn-delete {
        background: #ff4444;
        color: #fff;
      }

      .btn-edit {
        background: #00d4ff;
        color: #000;
      }

      .btn-approve:hover,
      .btn-reject:hover,
      .btn-delete:hover,
      .btn-edit:hover {
        transform: translateY(-2px);
      }

      .tab-buttons {
        display: flex;
        gap: 10px;
        margin-bottom: 20px;
        flex-wrap: wrap;
      }

      .tab-btn {
        padding: 10px 20px;
        background: rgba(255, 255, 255, 0.1);
        border: none;
        border-radius: 8px;
        cursor: pointer;
        transition: all 0.3s;
      }

      .tab-btn.active {
        background: #4dffb8;
        color: #000;
      }

      .export-btn,
      .import-btn {
        margin: 10px;
        padding: 10px 20px;
        background: #00d4ff;
        border: none;
        border-radius: 8px;
        cursor: pointer;
      }

      .import-btn {
        background: #ffa500;
      }

      .stats {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 20px;
        margin-bottom: 30px;
      }

      .stat-card {
        padding: 20px;
        border-radius: 15px;
        text-align: center;
        background: rgba(255, 255, 255, 0.1);
      }

      .stat-number {
        font-size: 36px;
        font-weight: bold;
        color: #4dffb8;
      }

      .search-box {
        margin-bottom: 20px;
        padding: 10px;
        width: 100%;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.2);
        color: white;
      }

      .modal {
        display: none;
        position: fixed;
        z-index: 1000;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.7);
      }

      .modal-content {
        background: rgba(20, 20, 40, 0.95);
        margin: 5% auto;
        padding: 30px;
        border-radius: 20px;
        width: 90%;
        max-width: 500px;
      }

      .modal-content input,
      .modal-content textarea {
        width: 100%;
        padding: 10px;
        margin: 10px 0;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.2);
        color: white;
      }
    </style>
  </head>
  <body>
    <div class="bg"></div>

    <div id="adminLogin" class="admin-login glass">
      <h2>Admin Login</h2>
      <input
        type="password"
        id="adminPassword"
        placeholder="Enter admin password"
      />
      <button onclick="login()" class="submit-suggestion">Login</button>
    </div>

    <div id="adminPanel" style="display: none">
      <div class="admin-container">
        <div class="admin-header">
          <h1>Mirava Admin Panel</h1>
          <div>
            <button onclick="exportAllData()" class="export-btn">
              📥 Export All Data (JSON)
            </button>
            <button onclick="importJSONFile()" class="import-btn">
              📤 Import JSON File
            </button>
            <button
              onclick="syncToMain()"
              class="export-btn"
              style="background: #4dffb8"
            >
              🔄 Sync to Main Page
            </button>
            <button
              onclick="exportMirrorJson()"
              class="export-btn"
              style="background: #a78bfa"
            >
              📄 Export mirror.json
            </button>
            <button
              onclick="logout()"
              class="export-btn"
              style="background: #ff6b6b"
            >
              🚪 Logout
            </button>
          </div>
        </div>

        <div class="stats" id="stats"></div>

        <input
          type="text"
          id="searchSuggestions"
          class="search-box"
          placeholder="🔍 Search suggestions by name, URL, or submitter..."
        />

        <div class="tab-buttons">
          <button class="tab-btn active" onclick="showTab('pending')">
            ⏳ Pending (<span id="pendingCount">0</span>)
          </button>
          <button class="tab-btn" onclick="showTab('approved')">
            ✅ Approved (<span id="approvedCount">0</span>)
          </button>
          <button class="tab-btn" onclick="showTab('rejected')">
            ❌ Rejected (<span id="rejectedCount">0</span>)
          </button>
          <button class="tab-btn" onclick="showTab('all_mirrors')">
            📦 All Mirrors
          </button>
        </div>

        <div id="suggestionsList" class="suggestions-list"></div>
      </div>
    </div>

    <!-- Edit Modal -->
    <div id="editModal" class="modal">
      <div class="modal-content">
        <h2>Edit Mirror</h2>
        <input type="text" id="editName" placeholder="Mirror Name" />
        <input type="text" id="editUrl" placeholder="URL" />
        <textarea id="editDesc" placeholder="Description" rows="3"></textarea>
        <input
          type="text"
          id="editPackages"
          placeholder="Packages (comma-separated)"
        />
        <button onclick="saveEdit()" class="btn-approve">Save Changes</button>
        <button onclick="closeEditModal()" class="btn-reject">Cancel</button>
      </div>
    </div>

    <script>
      const ADMIN_PASSWORD = "mirava2024"; // Change this!
      let currentEditId = null;
      let currentTab = "pending";
      let allSuggestions = [];
      let originalMirrors = { official_iran_mirrors: [], global_mirrors: [] };

      // Load mirror.json
      async function loadOriginalMirrors() {
        try {
          const response = await fetch("mirror.json");
          originalMirrors = await response.json();
        } catch (error) {
          console.error("Could not load mirror.json", error);
          originalMirrors = { official_iran_mirrors: [], global_mirrors: [] };
        }
      }

      function login() {
        const password = document.getElementById("adminPassword").value;
        if (password === ADMIN_PASSWORD) {
          localStorage.setItem("adminLoggedIn", "true");
          document.getElementById("adminLogin").style.display = "none";
          document.getElementById("adminPanel").style.display = "block";
          loadSuggestions();
          loadOriginalMirrors();
        } else {
          alert("Wrong password!");
        }
      }

      function logout() {
        localStorage.removeItem("adminLoggedIn");
        location.reload();
      }

      function checkAuth() {
        if (localStorage.getItem("adminLoggedIn") === "true") {
          document.getElementById("adminLogin").style.display = "none";
          document.getElementById("adminPanel").style.display = "block";
          loadSuggestions();
          loadOriginalMirrors();
        }
      }

      // Update the loadSuggestions function in admin.html
      function loadSuggestions() {
        // Try to load from the main key first
        const stored = localStorage.getItem("mirrorSuggestions");
        if (stored) {
          allSuggestions = JSON.parse(stored);
        } else {
          // Fall back to old key for backward compatibility
          const oldStored = localStorage.getItem("pendingMirrorSuggestions");
          if (oldStored) {
            allSuggestions = JSON.parse(oldStored);
            // Migrate to new key
            localStorage.setItem("mirrorSuggestions", oldStored);
          } else {
            allSuggestions = [];
          }
        }

        saveSuggestions(); // Save to ensure using correct key
        updateStats();

        if (currentTab === "all_mirrors") {
          displayAllMirrors();
        } else {
          filterAndDisplaySuggestions();
        }
      }

      // Update saveSuggestions function
      function saveSuggestions() {
        // Save to both keys for compatibility
        localStorage.setItem(
          "mirrorSuggestions",
          JSON.stringify(allSuggestions),
        );
        localStorage.setItem(
          "pendingMirrorSuggestions",
          JSON.stringify(allSuggestions),
        );
      }

      // Add a function to view pending count on main page
      function getPendingCount() {
        const suggestions = JSON.parse(
          localStorage.getItem("mirrorSuggestions") || "[]",
        );
        return suggestions.filter((s) => s.status === "pending").length;
      }

      // Optional: Show pending count badge on main page
      if (document.getElementById("pendingBadge")) {
        setInterval(() => {
          const count = getPendingCount();
          const badge = document.getElementById("pendingBadge");
          if (badge && count > 0) {
            badge.style.display = "inline-block";
            badge.textContent = count;
          }
        }, 5000);
      }

      function updateStats() {
        const pending = allSuggestions.filter(
          (s) => s.status === "pending",
        ).length;
        const approved = allSuggestions.filter(
          (s) => s.status === "approved",
        ).length;
        const rejected = allSuggestions.filter(
          (s) => s.status === "rejected",
        ).length;

        document.getElementById("pendingCount").innerHTML = pending;
        document.getElementById("approvedCount").innerHTML = approved;
        document.getElementById("rejectedCount").innerHTML = rejected;

        document.getElementById("stats").innerHTML = `
                <div class="stat-card">
                    <div class="stat-number">${pending}</div>
                    <div>Pending</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">${approved}</div>
                    <div>Approved</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">${rejected}</div>
                    <div>Rejected</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">${originalMirrors.official_iran_mirrors.length + originalMirrors.global_mirrors.length}</div>
                    <div>Total Mirrors</div>
                </div>
            `;
      }

      function filterAndDisplaySuggestions() {
        let filtered = allSuggestions.filter((s) => s.status === currentTab);

        // Apply search filter
        const searchTerm = document
          .getElementById("searchSuggestions")
          ?.value.toLowerCase();
        if (searchTerm) {
          filtered = filtered.filter(
            (s) =>
              s.name.toLowerCase().includes(searchTerm) ||
              s.url.toLowerCase().includes(searchTerm) ||
              s.submitter.toLowerCase().includes(searchTerm) ||
              s.description.toLowerCase().includes(searchTerm),
          );
        }

        displaySuggestions(filtered);
      }

      function displaySuggestions(suggestions) {
        const container = document.getElementById("suggestionsList");

        if (suggestions.length === 0) {
          container.innerHTML = `<p style="text-align:center;">No ${currentTab} suggestions found.</p>`;
          return;
        }

        container.innerHTML = suggestions
          .map(
            (suggestion) => `
                <div class="suggestion-card ${suggestion.status}" data-id="${suggestion.id}">
                    <div class="suggestion-status status-${suggestion.status}">
                        ${suggestion.status.toUpperCase()}
                    </div>
                    <h3>${escapeHtml(suggestion.name)}</h3>
                    <p><strong>URL:</strong> <a href="${suggestion.url}" target="_blank">${suggestion.url}</a></p>
                    <p><strong>Description:</strong> ${escapeHtml(suggestion.description)}</p>
                    <p><strong>Packages:</strong> ${suggestion.packages.join(", ")}</p>
                    <p><strong>Submitted by:</strong> ${escapeHtml(suggestion.submitter)}</p>
                    <p><strong>Submitted on:</strong> ${new Date(suggestion.submittedAt).toLocaleString()}</p>
                    ${suggestion.email ? `<p><strong>Email:</strong> ${escapeHtml(suggestion.email)}</p>` : ""}
                    
                    <div class="suggestion-actions">
                        ${
                          suggestion.status === "pending"
                            ? `
                            <button onclick="approveSuggestion(${suggestion.id})" class="btn-approve">✓ Approve</button>
                            <button onclick="rejectSuggestion(${suggestion.id})" class="btn-reject">✗ Reject</button>
                            <button onclick="editSuggestion(${suggestion.id})" class="btn-edit">✎ Edit</button>
                        `
                            : ""
                        }
                        ${
                          suggestion.status === "approved"
                            ? `
                            <button onclick="rejectSuggestion(${suggestion.id})" class="btn-reject">✗ Move to Rejected</button>
                            <button onclick="editSuggestion(${suggestion.id})" class="btn-edit">✎ Edit</button>
                        `
                            : ""
                        }
                        ${
                          suggestion.status === "rejected"
                            ? `
                            <button onclick="approveSuggestion(${suggestion.id})" class="btn-approve">✓ Move to Approved</button>
                        `
                            : ""
                        }
                        <button onclick="deleteSuggestion(${suggestion.id})" class="btn-delete">🗑 Delete</button>
                    </div>
                </div>
            `,
          )
          .join("");
      }

      function displayAllMirrors() {
        const allMirrors = [
          ...originalMirrors.official_iran_mirrors,
          ...originalMirrors.global_mirrors,
          ...allSuggestions
            .filter((s) => s.status === "approved")
            .map((s) => ({
              name: s.name,
              url: s.url,
              description: s.description,
              packages: s.packages,
            })),
        ];

        const searchTerm = document
          .getElementById("searchSuggestions")
          ?.value.toLowerCase();
        let filtered = allMirrors;
        if (searchTerm) {
          filtered = allMirrors.filter(
            (m) =>
              m.name.toLowerCase().includes(searchTerm) ||
              m.url.toLowerCase().includes(searchTerm) ||
              m.description.toLowerCase().includes(searchTerm),
          );
        }

        const container = document.getElementById("suggestionsList");
        container.innerHTML =
          `<h3>All Mirrors (${filtered.length})</h3>` +
          filtered
            .map(
              (mirror) => `
                    <div class="suggestion-card">
                        <h3>${escapeHtml(mirror.name)}</h3>
                        <p><strong>URL:</strong> <a href="${mirror.url}" target="_blank">${mirror.url}</a></p>
                        <p><strong>Description:</strong> ${escapeHtml(mirror.description)}</p>
                        <p><strong>Packages:</strong> ${mirror.packages.join(", ")}</p>
                    </div>
                `,
            )
            .join("");
      }

      function syncApprovedMirrors() {
        const approvedMirrors = allSuggestions
          .filter((s) => s.status === "approved")
          .map((s) => ({
            name: s.name,
            url: s.url,
            description: s.description,
            packages: s.packages,
          }));
        localStorage.setItem("approvedMirrors", JSON.stringify(approvedMirrors));
      }

      function approveSuggestion(id) {
        const suggestion = allSuggestions.find((s) => s.id === id);
        if (suggestion) {
          suggestion.status = "approved";
          saveSuggestions();
          syncApprovedMirrors();
          loadSuggestions();
          showToast("Mirror approved and live on main page!");
        }
      }

      function rejectSuggestion(id) {
        const suggestion = allSuggestions.find((s) => s.id === id);
        if (suggestion) {
          suggestion.status = "rejected";
          saveSuggestions();
          syncApprovedMirrors();
          loadSuggestions();
          showToast("Mirror rejected.");
        }
      }

      function deleteSuggestion(id) {
        if (
          confirm(
            "Are you sure you want to permanently delete this suggestion?",
          )
        ) {
          allSuggestions = allSuggestions.filter((s) => s.id !== id);
          saveSuggestions();
          loadSuggestions();
          showToast("Suggestion deleted.");
        }
      }

      function editSuggestion(id) {
        const suggestion = allSuggestions.find((s) => s.id === id);
        if (suggestion) {
          currentEditId = id;
          document.getElementById("editName").value = suggestion.name;
          document.getElementById("editUrl").value = suggestion.url;
          document.getElementById("editDesc").value = suggestion.description;
          document.getElementById("editPackages").value =
            suggestion.packages.join(", ");
          document.getElementById("editModal").style.display = "block";
        }
      }

      function saveEdit() {
        if (currentEditId) {
          const suggestion = allSuggestions.find((s) => s.id === currentEditId);
          if (suggestion) {
            suggestion.name = document.getElementById("editName").value;
            suggestion.url = document.getElementById("editUrl").value;
            suggestion.description = document.getElementById("editDesc").value;
            suggestion.packages = document
              .getElementById("editPackages")
              .value.split(",")
              .map((p) => p.trim());
            saveSuggestions();
            loadSuggestions();
            closeEditModal();
            showToast("Mirror updated successfully!");
          }
        }
      }

      function closeEditModal() {
        document.getElementById("editModal").style.display = "none";
        currentEditId = null;
      }

      function exportAllData() {
        const exportData = {
          suggestions: allSuggestions,
          original_mirrors: originalMirrors,
          exportDate: new Date().toISOString(),
        };

        const dataStr = JSON.stringify(exportData, null, 2);
        const blob = new Blob([dataStr], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `mirava_backup_${Date.now()}.json`;
        a.click();
        URL.revokeObjectURL(url);
        showToast("Data exported successfully!");
      }

      function importJSONFile() {
        const input = document.createElement("input");
        input.type = "file";
        input.accept = ".json";
        input.onchange = (e) => {
          const file = e.target.files[0];
          const reader = new FileReader();
          reader.onload = (event) => {
            try {
              const imported = JSON.parse(event.target.result);
              if (imported.suggestions) {
                allSuggestions = imported.suggestions;
                saveSuggestions();
              }
              if (imported.original_mirrors) {
                originalMirrors = imported.original_mirrors;
              }
              loadSuggestions();
              showToast("Data imported successfully!");
            } catch (error) {
              alert("Invalid JSON file!");
            }
          };
          reader.readAsText(file);
        };
        input.click();
      }

      function syncToMain() {
        syncApprovedMirrors();
        showToast(`Synced ${allSuggestions.filter(s => s.status === "approved").length} approved mirrors to main page.`);
      }

      function exportMirrorJson() {
        const approvedMirrors = allSuggestions
          .filter((s) => s.status === "approved")
          .map((s) => ({
            name: s.name,
            url: s.url,
            description: s.description,
            packages: s.packages,
          }));
        const updatedMirrors = {
          official_iran_mirrors: [
            ...originalMirrors.official_iran_mirrors,
            ...approvedMirrors,
          ],
          global_mirrors: originalMirrors.global_mirrors,
        };
        const dataStr = JSON.stringify(updatedMirrors, null, 2);
        const blob = new Blob([dataStr], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "mirror_updated.json";
        a.click();
        URL.revokeObjectURL(url);
        showToast("mirror_updated.json downloaded — replace mirror.json in your repo.");
      }

      function showTab(tab) {
        currentTab = tab;
        document
          .querySelectorAll(".tab-btn")
          .forEach((btn) => btn.classList.remove("active"));
        event.target.classList.add("active");

        if (tab === "all_mirrors") {
          displayAllMirrors();
        } else {
          filterAndDisplaySuggestions();
        }
      }

      function showToast(message) {
        const toast = document.createElement("div");
        toast.className = "copy-toast glass";
        toast.textContent = message;
        toast.style.position = "fixed";
        toast.style.bottom = "20px";
        toast.style.right = "20px";
        toast.style.zIndex = "9999";
        document.body.appendChild(toast);
        setTimeout(() => toast.classList.add("show"), 10);
        setTimeout(() => {
          toast.classList.remove("show");
          setTimeout(() => toast.remove(), 300);
        }, 3000);
      }

      function escapeHtml(str) {
        if (!str) return "";
        return str.replace(/[&<>]/g, function (m) {
          if (m === "&") return "&amp;";
          if (m === "<") return "&lt;";
          if (m === ">") return "&gt;";
          return m;
        });
      }

      // Add search listener
      if (document.getElementById("searchSuggestions")) {
        document
          .getElementById("searchSuggestions")
          .addEventListener("input", () => {
            if (currentTab === "all_mirrors") {
              displayAllMirrors();
            } else {
              filterAndDisplaySuggestions();
            }
          });
      }

      checkAuth();
    </script>
  </body>
</html>
